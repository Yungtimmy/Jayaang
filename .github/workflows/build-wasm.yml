name: Build CosmWasm WASM

on:
  workflow_dispatch:
  push:
    paths:
      - "cosmwasm/inj-merkle-airdrop/**"
      - ".github/workflows/build-wasm.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with CosmWasm optimizer
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/cosmwasm/inj-merkle-airdrop:/code" \
            --mount type=volume,source=inj_merkle_airdrop_cache,target=/target \
            --mount type=volume,source=registry_cache,target=/usr/local/cargo/registry \
            cosmwasm/optimizer:0.17.0
          ls -la cosmwasm/inj-merkle-airdrop/artifacts/
          mkdir -p cosmwasm/artifacts
          cp cosmwasm/inj-merkle-airdrop/artifacts/inj_merkle_airdrop.wasm cosmwasm/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: inj_merkle_airdrop-wasm
          path: cosmwasm/artifacts/inj_merkle_airdrop.wasm